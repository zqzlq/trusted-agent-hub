openapi: "3.0.3"
info:
  title: Trusted Agent Hub API
  description: |
    可信 Agent Skills 与 MCP Hub 平台后端 API。

    ## 角色
    - **普通用户 (user)**: 浏览、搜索、安装、评分
    - **提交者 (submitter)**: 提交和管理能力包
    - **审核员 (reviewer)**: 人工审核
    - **管理员 (admin)**: 下架、审计

    ## 负责人
    - **A (Producer 侧)**: `/packages` 写入, `/versions/` 提交/扫描/审核/发布/下架, `/audit-logs`
    - **B (Consumer 侧)**: `/packages` 搜索/详情, `/versions/` 评分, `/stats`, `/ratings`
    - **共同**: `/auth`, `/health`
  version: "0.1.0"
  contact:
    name: Trusted Agent Hub Team

servers:
  - url: http://localhost:8000/api/v0
    description: 本地开发环境

tags:
  - name: Auth
    description: 认证与授权
  - name: Packages
    description: 能力包管理（搜索、浏览、创建）
  - name: Versions
    description: 版本管理（提交、扫描、审核、发布、下架）
  - name: TrustScore
    description: 信任评分
  - name: Ratings
    description: 用户评分与评论
  - name: Audit
    description: 审计日志
  - name: Stats
    description: 统计数据
  - name: Health
    description: 健康检查

# ============================================================
# Security Schemes
# ============================================================
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ==========================================================
  # Schemas
  # ==========================================================
  schemas:
    # ---- 通用 ----
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, example: "NOT_FOUND" }
            message: { type: string, example: "能力包不存在" }
            details: { type: array, items: { type: string } }

    PaginatedResponse:
      type: object
      properties:
        items: { type: array }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
        total_pages: { type: integer }

    # ---- 用户 ----
    UserBrief:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_name: { type: string }
        role: { type: string, enum: [user, submitter, reviewer, admin] }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, pattern: '^[a-z][a-z0-9_]{2,31}$' }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        display_name: { type: string }

    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: "bearer" }
        expires_in: { type: integer, example: 3600 }
        user: { $ref: '#/components/schemas/UserBrief' }

    # ---- 能力包 ----
    PackageSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "code-review-skill" }
        description: { type: string }
        type: { type: string, enum: [skill, mcp_server, plugin, subagent, command, prompt] }
        license: { type: string }
        keywords: { type: array, items: { type: string } }
        category: { type: string }
        homepage: { type: string }
        icon_url: { type: string }
        owner: { $ref: '#/components/schemas/UserBrief' }
        latest_version: { type: string, example: "1.0.0" }
        status: { type: string, enum: [draft, submitted, scanning, error, pending_review, approved, rejected, published, yanked] }
        trust_score: { type: integer, minimum: 0, maximum: 100 }
        risk_level: { type: string, enum: [trusted, low_risk, medium_risk, high_risk, untrusted] }
        install_count: { type: integer }
        avg_rating: { type: number, minimum: 0, maximum: 5 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PackageDetail:
      allOf:
        - $ref: '#/components/schemas/PackageSummary'
        - type: object
          properties:
            current_version:
              $ref: '#/components/schemas/VersionDetail'

    CreatePackageRequest:
      type: object
      required: [name, type, description]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{1,62}[a-z0-9]$'
          example: "my-code-review-skill"
        type:
          type: string
          enum: [skill, mcp_server, plugin, subagent, command, prompt]
        description:
          type: string
          minLength: 10
          maxLength: 200
        license:
          type: string
          default: "MIT"
        keywords:
          type: array
          items: { type: string }
        category:
          type: string
        homepage:
          type: string
          format: uri
        icon_url:
          type: string
          format: uri

    # ---- 版本 ----
    VersionDetail:
      type: object
      required:
        - id
        - package_id
        - version
        - author
        - source
        - integrity
        - compatibility
        - permissions
        - installation
        - status
      properties:
        id: { type: string, format: uuid }
        package_id: { type: string, format: uuid }
        version: { type: string, example: "1.0.0" }
        author:
          type: object
          properties:
            name: { type: string }
            email: { type: string }
            url: { type: string }
        source:
          type: object
          properties:
            type: { type: string, enum: [github, npm, pypi, docker, local_upload] }
            repository_url: { type: string }
            owner: { type: string }
            repo: { type: string }
            ref_type: { type: string, enum: [branch, tag, commit, release] }
            ref: { type: string }
            commit_hash: { type: string }
            subdirectory: { type: string }
            verified_owner: { type: boolean }
        integrity:
          type: object
          properties:
            sha256: { type: string }
            signature: { type: string }
            attestation_url: { type: string }
            sbom_url: { type: string }
        compatibility:
          type: array
          items:
            type: string
            enum: [claude-code, claude-ai, cursor, vscode, mcp-client-generic, openai-agents, github-copilot, windsurf, cline]
        permissions:
          $ref: '#/components/schemas/Permissions'
        installation:
          $ref: '#/components/schemas/Installation'
        type_config:
          type: object
          description: 类型专属配置（skill_config / mcp_server_config / plugin_config / subagent_config / command_config / prompt_config 之一）
        dependencies:
          type: object
          description: 依赖声明
        entry_points:
          type: object
          properties:
            main: { type: string }
            config: { type: string }
            scripts: { type: array, items: { type: string } }
        status:
          type: string
          enum: [draft, submitted, scanning, error, pending_review, approved, rejected, published, yanked, resubmitted]
        submitted_at: { type: string, format: date-time }
        published_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    Permissions:
      type: object
      required: [filesystem, shell, network]
      properties:
        filesystem:
          type: object
          properties:
            read: { type: array, items: { type: string } }
            write: { type: array, items: { type: string } }
            delete: { type: boolean, default: false }
        shell:
          type: object
          properties:
            allowed: { type: boolean }
            commands: { type: array, items: { type: string } }
            description: { type: string }
        network:
          type: object
          properties:
            allowed: { type: boolean }
            domains: { type: array, items: { type: string } }
            description: { type: string }
        environment:
          type: object
          properties:
            read: { type: array, items: { type: string } }
            write: { type: array, items: { type: string } }
        credentials:
          type: object
          properties:
            access:
              type: array
              items: { type: string, enum: [api_key, ssh_key, token, password, oauth_token] }
            description: { type: string }
        database:
          type: object
          properties:
            allowed: { type: boolean }
            drivers: { type: array, items: { type: string } }
            description: { type: string }
        browser:
          type: object
          properties:
            allowed: { type: boolean }
            description: { type: string }
        external_services:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              url: { type: string }
              description: { type: string }

    Installation:
      type: object
      required: [method, targets]
      properties:
        method:
          type: string
          enum: [copy_directory, npm_install, pip_install, docker_run, manual_steps]
        targets:
          type: array
          items:
            type: object
            properties:
              client: { type: string }
              destination: { type: string }
              config_template: { type: string }
        command: { type: string }
        pre_install_message: { type: string }
        post_install_message: { type: string }

    CreateVersionRequest:
      type: object
      required: [version, author, source, integrity, compatibility, permissions, installation]
      properties:
        version:
          type: string
          pattern: '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[a-zA-Z0-9.]+)?(\+[a-zA-Z0-9.]+)?$'
          example: "1.0.0"
        author:
          type: object
          required: [name, email]
          properties:
            name: { type: string, minLength: 1, maxLength: 100 }
            email: { type: string, format: email }
            url: { type: string, format: uri }
        source:
          type: object
          required: [type, repository_url, ref, commit_hash]
          properties:
            type: { type: string, enum: [github, npm, pypi, docker, local_upload] }
            repository_url: { type: string, format: uri }
            owner: { type: string }
            repo: { type: string }
            ref_type: { type: string, enum: [branch, tag, commit, release] }
            ref: { type: string }
            commit_hash: { type: string, pattern: '^[a-f0-9]{40}$' }
            subdirectory: { type: string }
        integrity:
          type: object
          required: [sha256]
          properties:
            sha256: { type: string, pattern: '^[a-f0-9]{64}$' }
            signature: { type: string }
            attestation_url: { type: string }
        compatibility:
          type: array
          minItems: 1
          items: { type: string }
        permissions:
          $ref: '#/components/schemas/Permissions'
        installation:
          $ref: '#/components/schemas/Installation'
        type_config:
          type: object
        dependencies:
          type: object
        entry_points:
          type: object

    # ---- 扫描报告 ----
    ScanReport:
      type: object
      properties:
        scan_id: { type: string }
        package_name: { type: string }
        version: { type: string }
        scanner_version: { type: string }
        duration_ms: { type: integer }
        summary:
          type: object
          properties:
            total: { type: integer }
            critical: { type: integer }
            high: { type: integer }
            medium: { type: integer }
            low: { type: integer }
            info: { type: integer }
            pass_rate: { type: number }
        findings:
          type: array
          items:
            $ref: '#/components/schemas/ScanFinding'
        metadata_validation:
          type: object
        structure_check:
          type: object
        dependency_check:
          type: object
        scanned_at: { type: string, format: date-time }

    ScanFinding:
      type: object
      properties:
        id: { type: string }
        rule_id: { type: string }
        severity: { type: string, enum: [critical, high, medium, low, info] }
        category: { type: string }
        title: { type: string }
        description: { type: string }
        location:
          type: object
          properties:
            file: { type: string }
            line: { type: integer }
            snippet: { type: string }
        evidence: { type: string }
        remediation: { type: string }
        cwe_id: { type: string }

    # ---- 审核 ----
    CreateReviewRequest:
      type: object
      required: [conclusion]
      properties:
        conclusion:
          type: string
          enum: [approved, rejected, changes_requested]
        comment:
          type: string
          maxLength: 2000

    ReviewRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        version_id: { type: string, format: uuid }
        reviewer: { $ref: '#/components/schemas/UserBrief' }
        conclusion: { type: string, enum: [approved, rejected, changes_requested] }
        comment: { type: string }
        reviewed_at: { type: string, format: date-time }

    # ---- 信任评分 ----
    TrustScoreDetail:
      type: object
      properties:
        score: { type: integer, minimum: 0, maximum: 100 }
        package_name: { type: string }
        version: { type: string }
        model_version: { type: string }
        dimensions:
          type: object
          properties:
            source_trust: { $ref: '#/components/schemas/ScoreDimension' }
            author_reputation: { $ref: '#/components/schemas/ScoreDimension' }
            metadata_completeness: { $ref: '#/components/schemas/ScoreDimension' }
            permission_minimization: { $ref: '#/components/schemas/ScoreDimension' }
            scan_results: { $ref: '#/components/schemas/ScoreDimension' }
            manual_review: { $ref: '#/components/schemas/ScoreDimension' }
            version_stability: { $ref: '#/components/schemas/ScoreDimension' }
            user_feedback: { $ref: '#/components/schemas/ScoreDimension' }
            signature_verifiability: { $ref: '#/components/schemas/ScoreDimension' }
        explanations:
          type: array
          items:
            type: object
            properties:
              dimension: { type: string }
              message: { type: string }
              deduction: { type: integer }
              evidence: { type: string }
        risk_summary:
          type: object
          properties:
            level: { type: string, enum: [trusted, low_risk, medium_risk, high_risk, untrusted] }
            top_risks: { type: array, items: { type: string } }
            install_recommendation: { type: string, enum: [safe, review_recommended, caution, not_recommended, blocked] }
        calculated_at: { type: string, format: date-time }

    ScoreDimension:
      type: object
      properties:
        score: { type: integer, minimum: 0, maximum: 100 }
        weight: { type: number, minimum: 0, maximum: 1 }
        details: { type: object }

    # ---- 评分/评论 ----
    CreateRatingRequest:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 1000

    RatingRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        user: { $ref: '#/components/schemas/UserBrief' }
        score: { type: integer }
        comment: { type: string }
        created_at: { type: string, format: date-time }

    # ---- 审计日志 ----
    AuditLogEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        version_id: { type: string, format: uuid }
        actor: { $ref: '#/components/schemas/UserBrief' }
        action: { type: string }
        details: { type: object }
        ip_address: { type: string }
        created_at: { type: string, format: date-time }

    # ---- 统计 ----
    PlatformStats:
      type: object
      properties:
        total_packages: { type: integer }
        total_versions: { type: integer }
        total_installs: { type: integer }
        total_users: { type: integer }
        packages_by_type:
          type: object
          additionalProperties: { type: integer }
        top_installed:
          type: array
          items: { $ref: '#/components/schemas/PackageSummary' }
        recent_published:
          type: array
          items: { $ref: '#/components/schemas/PackageSummary' }

    # ---- 通用参数 ----
    PackageTypeFilter:
      name: type
      in: query
      schema:
        type: string
        enum: [skill, mcp_server, plugin, subagent, command, prompt]

    CompatibilityFilter:
      name: compatibility
      in: query
      schema:
        type: string
        enum: [claude-code, claude-ai, cursor, vscode, mcp-client-generic, openai-agents, github-copilot, windsurf, cline]

# ============================================================
# Paths — Auth
# ============================================================
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: 注册新用户
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201': { description: 注册成功, content: { application/json: { schema: { $ref: '#/components/schemas/TokenResponse' } } } }
        '409': { description: 用户名或邮箱已存在 }

  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: 登录成功, content: { application/json: { schema: { $ref: '#/components/schemas/TokenResponse' } } } }
        '401': { description: 用户名或密码错误 }

  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UserBrief' } } } }

  # ==========================================================
  # Paths — Packages (Consumer 侧: B)
  # ==========================================================
  /packages:
    get:
      tags: [Packages]
      summary: 搜索/浏览能力包列表 [B]
      description: 支持关键词搜索、类型筛选、客户端筛选、评分排序、分页
      security: []
      parameters:
        - name: q
          in: query
          description: 搜索关键词（匹配 name, description, keywords）
          schema: { type: string }
        - $ref: '#/components/schemas/PackageTypeFilter'
        - $ref: '#/components/schemas/CompatibilityFilter'
        - name: category
          in: query
          schema: { type: string }
        - name: status
          in: query
          description: 默认只返回 published
          schema:
            type: string
            default: published
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [trust_score, updated_at, install_count, avg_rating, name]
            default: trust_score
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/PackageSummary' }

    post:
      tags: [Packages]
      summary: 创建能力包 [A]
      description: 提交者创建一个新的能力包记录
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePackageRequest' }
      responses:
        '201': { description: 创建成功, content: { application/json: { schema: { $ref: '#/components/schemas/PackageSummary' } } } }
        '409': { description: 名称已存在 }

  /packages/{name}:
    get:
      tags: [Packages]
      summary: 获取能力包详情 [B]
      security: []
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PackageDetail' } } } }
        '404': { description: 不存在 }

  /packages/{name}/versions:
    get:
      tags: [Packages]
      summary: 获取能力包版本列表 [B]
      security: []
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/VersionDetail' }

    post:
      tags: [Packages]
      summary: 创建新版本 [A]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVersionRequest' }
      responses:
        '201': { description: 创建成功, content: { application/json: { schema: { $ref: '#/components/schemas/VersionDetail' } } } }
        '409': { description: 版本号已存在 }

  # ==========================================================
  # Paths — Versions (供给侧: A)
  # ==========================================================
  /versions/{version_id}:
    get:
      tags: [Versions]
      summary: 获取版本详情 [A/B]
      security: []
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/VersionDetail' } } } }

  /versions/{version_id}/submit:
    post:
      tags: [Versions]
      summary: 提交版本进入审核队列 [A]
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: 提交成功, content: { application/json: { schema: { $ref: '#/components/schemas/VersionDetail' } } } }
        '400': { description: 状态不允许提交（仅 draft 可提交） }

  /versions/{version_id}/scan:
    post:
      tags: [Versions]
      summary: 触发版本扫描 [A]
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: 扫描任务已触发 }
        '400': { description: 状态不允许扫描 }

  /versions/{version_id}/scan-report:
    get:
      tags: [Versions]
      summary: 获取扫描报告 [A/B]
      description: 审核员可见完整报告，普通用户可见摘要
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ScanReport' } } } }
        '404': { description: 扫描报告不存在 }

  /versions/{version_id}/diff:
    get:
      tags: [Versions]
      summary: 获取版本差异 [A]
      description: 对比当前版本与上一版本的差异
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  from_version: { type: string }
                  to_version: { type: string }
                  diff: { type: object }

  /versions/{version_id}/reviews:
    get:
      tags: [Versions]
      summary: 获取审核记录 [A/B]
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReviewRecord' }

    post:
      tags: [Versions]
      summary: 提交审核结论 [A]
      description: 审核员对版本做出审核结论
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReviewRequest' }
      responses:
        '201': { description: 审核完成, content: { application/json: { schema: { $ref: '#/components/schemas/ReviewRecord' } } } }
        '403': { description: 仅审核员可操作 }

  /versions/{version_id}/approve:
    post:
      tags: [Versions]
      summary: 审核通过 [A]
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
      responses:
        '200': { description: 已通过 }

  /versions/{version_id}/reject:
    post:
      tags: [Versions]
      summary: 审核驳回 [A]
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string, minLength: 10 }
      responses:
        '200': { description: 已驳回 }

  /versions/{version_id}/request-changes:
    post:
      tags: [Versions]
      summary: 要求修改 [A]
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string, minLength: 10 }
      responses:
        '200': { description: 已要求修改 }

  /versions/{version_id}/publish:
    post:
      tags: [Versions]
      summary: 发布版本 [A]
      description: 审核通过后发布到 Hub
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: 已发布 }
        '400': { description: 仅 approved 状态可发布 }

  /versions/{version_id}/yank:
    post:
      tags: [Versions]
      summary: 下架版本 [A]
      description: 管理员下架已发布的能力包
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 10 }
      responses:
        '200': { description: 已下架 }
        '403': { description: 仅管理员可操作 }

  # ==========================================================
  # Paths — Trust Score (Consumer 侧: B)
  # ==========================================================
  /versions/{version_id}/trust-score:
    get:
      tags: [TrustScore]
      summary: 获取信任评分详情 [B]
      security: []
      parameters:
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TrustScoreDetail' } } } }
        '404': { description: 评分不存在 }

  # ==========================================================
  # Paths — Ratings (Consumer 侧: B)
  # ==========================================================
  /packages/{name}/ratings:
    get:
      tags: [Ratings]
      summary: 获取用户评分列表 [B]
      security: []
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/RatingRecord' }
                      avg_rating: { type: number }

    post:
      tags: [Ratings]
      summary: 提交评分/评论 [B]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRatingRequest' }
      responses:
        '201': { description: 评分成功 }

  # ==========================================================
  # Paths — Audit Logs (供给侧: A)
  # ==========================================================
  /audit-logs:
    get:
      tags: [Audit]
      summary: 查询审计日志 [A]
      parameters:
        - name: version_id
          in: query
          schema: { type: string, format: uuid }
        - name: action
          in: query
          schema:
            type: string
            enum: [submit, scan_start, scan_complete, approve, reject, request_changes, publish, yank, unyank, resubmit]
        - name: actor_id
          in: query
          schema: { type: string, format: uuid }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AuditLogEntry' }

  # ==========================================================
  # Paths — Stats (Consumer 侧: B)
  # ==========================================================
  /stats:
    get:
      tags: [Stats]
      summary: 获取平台统计数据 [B]
      security: []
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PlatformStats' } } } }

  # ==========================================================
  # Paths — Health
  # ==========================================================
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  version: { type: string, example: "0.1.0" }
                  db_connected: { type: boolean }
