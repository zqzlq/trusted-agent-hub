name: CLI

on:
  pull_request:
    paths:
      - "apps/cli/**"
      - ".github/workflows/cli.yml"
  push:
    branches:
      - main
    paths:
      - "apps/cli/**"
      - ".github/workflows/cli.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/cli/package-lock.json
      - run: npm ci
      - run: npm test
